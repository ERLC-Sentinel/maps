<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER:LC Maps</title>
    <link rel="stylesheet" href="workers/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body class="dark-theme">
    <div id="app">
        <aside id="sidebar">
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="search-bar" placeholder="Search..." class="pill-search" autocomplete="off">
                <div id="search-autocomplete" class="autocomplete-list"></div>
            </div>

            <div class="search-container">
                <i data-lucide="navigation" class="search-icon"></i>
                <input type="text" id="starting-input" placeholder="Starting..." class="pill-search" autocomplete="off">
                <div id="starting-autocomplete" class="autocomplete-list"></div>
            </div>

            <div class="search-container">
                <i data-lucide="map-pin" class="search-icon"></i>
                <input type="text" id="destination-input" placeholder="Destination..." class="pill-search" autocomplete="off">
                <div id="destination-autocomplete" class="autocomplete-list"></div>
            </div>

            <button id="go-btn" class="sidebar-btn go-btn">
                <i data-lucide="rocket"></i>
                Go
            </button>

            <div id="sidebar-content">
                <div class="dropdown" id="directions-dropdown" style="display: none;">
                    <div class="dropdown-header">
                        <div class="dropdown-title">
                            <i data-lucide="map" class="dropdown-icon"></i>
                            <span>Directions</span>
                        </div>
                        <div class="dropdown-header-right">
                            <i data-lucide="x" id="clear-route" class="action-icon"></i>
                            <i data-lucide="chevron-down" class="dropdown-chevron"></i>
                        </div>
                    </div>
                    <div class="dropdown-content">
                        <div id="route-info">
                            <div class="route-stat">
                                <span class="stat-label">Distance:</span>
                                <span id="route-distance">-</span>
                            </div>
                        </div>
                        <div id="directions-steps" class="steps-list"></div>
                    </div>
                </div>

                <div class="dropdown" id="settings-dropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-title">
                            <i data-lucide="settings" class="dropdown-icon"></i>
                            <span>Settings</span>
                        </div>
                        <i data-lucide="chevron-down" class="dropdown-chevron"></i>
                    </div>
                    <div class="dropdown-content">
                        <div class="feature-group toggle-row">
                            <label for="postal-toggle">Postals + Streets</label>
                            <label class="switch">
                                <input type="checkbox" id="postal-toggle" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <div class="feature-group toggle-row">
                            <label for="dev-mode-toggle">Developer Mode</label>
                            <label class="switch">
                                <input type="checkbox" id="dev-mode-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="dropdown" id="player-location-dropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-title">
                            <i data-lucide="car" class="dropdown-icon"></i>
                            <span>Player Location Fetching</span>
                        </div>
                        <i data-lucide="chevron-down" class="dropdown-chevron"></i>
                    </div>
                    <div class="dropdown-content">
                        <div class="feature-group">
                            <label for="api-key">API Key</label>
                            <input type="password" id="api-key" placeholder="Enter Server Key" class="sidebar-input">
                        </div>

                        <div class="feature-group">
                            <label for="player-name">Player Name</label>
                            <input type="text" id="player-name" placeholder="Enter username" class="sidebar-input">
                        </div>

                        <button id="get-location-btn" class="sidebar-btn">
                            <i data-lucide="map-pin"></i>
                            Get Location
                        </button>

                        <div class="output-group">
                            <label>Address</label>
                            <div id="address-output" class="output-box">No data</div>
                        </div>

                        <div class="output-group">
                            <label>Coordinates</label>
                            <div id="coords-output" class="output-box">No data</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="workers/script.js"></script>
    <script src="workers/testing.js"></script>
</body>

</html>
