<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER:LC Maps</title>
    <link rel="stylesheet" href="workers/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body class="dark-theme">
    <div id="app">
        <aside id="sidebar">
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="search-bar" placeholder="Search..." class="pill-search" autocomplete="off">
                <div id="search-autocomplete" class="autocomplete-list"></div>
            </div>

            <div class="search-container">
                <i data-lucide="navigation" class="search-icon"></i>
                <input type="text" id="starting-input" placeholder="Starting..." class="pill-search" autocomplete="off">
                <div id="starting-autocomplete" class="autocomplete-list"></div>
            </div>

            <div class="search-container">
                <i data-lucide="map-pin" class="search-icon"></i>
                <input type="text" id="destination-input" placeholder="Destination..." class="pill-search" autocomplete="off">
                <div id="destination-autocomplete" class="autocomplete-list"></div>
            </div>

            <button id="go-btn" class="sidebar-btn go-btn">
                <i data-lucide="rocket"></i>
                Go
            </button>

            <div id="sidebar-content">
                <div class="dropdown" id="directions-dropdown" style="display: none;">
                    <div class="dropdown-header">
                        <div class="dropdown-title">
                            <i data-lucide="map" class="dropdown-icon"></i>
                            <span>Directions</span>
                        </div>
                        <div class="dropdown-header-right">
                            <i data-lucide="x" id="clear-route" class="action-icon"></i>
                            <i data-lucide="chevron-down" class="dropdown-chevron"></i>
                        </div>
                    </div>
                    <div class="dropdown-content">
                        <div id="route-info">
                            <div class="route-stat">
                                <span class="stat-label">Distance:</span>
                                <span id="route-distance">-</span>
                            </div>
                        </div>
                        <div id="directions-steps" class="steps-list"></div>
                    </div>
                </div>

                <div class="dropdown" id="settings-dropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-title">
                            <i data-lucide="settings" class="dropdown-icon"></i>
                            <span>Settings</span>
                        </div>
                        <i data-lucide="chevron-down" class="dropdown-chevron"></i>
                    </div>
                    <div class="dropdown-content">
                        <div class="feature-group toggle-row">
                            <label for="postal-toggle">Postals + Streets</label>
                            <label class="switch">
                                <input type="checkbox" id="postal-toggle" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <div class="feature-group toggle-row">
                            <label for="dev-mode-toggle">Developer Mode</label>
                            <label class="switch">
                                <input type="checkbox" id="dev-mode-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <div class="feature-group toggle-row">
                            <label for="creation-mode-toggle">Creation Mode</label>
                            <label class="switch">
                                <input type="checkbox" id="creation-mode-toggle">
                                <span class="slider round"></span>
                            </label>
                        </div>

                        <button id="open-creation-data-btn" class="sidebar-btn">
                            <i data-lucide="wrench"></i>
                            Open Creation Data
                        </button>

                        <button id="import-creation-data-btn" class="sidebar-btn">
                            <i data-lucide="upload"></i>
                            Import Creation Data
                        </button>
                        <input type="file" id="import-creation-input" style="display: none;" accept=".json">

                        <button id="delete-creation-data-btn" class="sidebar-btn error">
                            <i data-lucide="trash-2"></i>
                            Delete Creation Data
                        </button>
                    </div>
                </div>

                <div class="dropdown" id="player-location-dropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-title">
                            <i data-lucide="car" class="dropdown-icon"></i>
                            <span>Player Location Fetching</span>
                        </div>
                        <i data-lucide="chevron-down" class="dropdown-chevron"></i>
                    </div>
                    <div class="dropdown-content">
                        <div class="feature-group">
                            <label for="api-key">API Key</label>
                            <input type="password" id="api-key" placeholder="Enter Server Key" class="sidebar-input">
                        </div>

                        <div class="feature-group">
                            <label for="player-name">Player Name</label>
                            <input type="text" id="player-name" placeholder="Enter username" class="sidebar-input">
                        </div>

                        <button id="get-location-btn" class="sidebar-btn">
                            <i data-lucide="map-pin"></i>
                            Get Location
                        </button>

                        <div class="output-group">
                            <label>Address</label>
                            <div id="address-output" class="output-box">No data</div>
                        </div>

                        <div class="output-group">
                            <label>Coordinates</label>
                            <div id="coords-output" class="output-box">No data</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div id="creation-modal" class="modal" style="display: none;">
            <div class="modal-header">
                <h3 id="modal-title">Create Node</h3>
                <i data-lucide="x" class="close-modal"></i>
            </div>
            <div class="modal-body">
                <div id="building-fields" style="display: none;">
                    <div class="feature-group">
                        <label for="building-label">Label</label>
                        <input type="text" id="building-label" class="sidebar-input">
                    </div>
                    <div class="feature-group">
                        <label for="building-address">Address</label>
                        <input type="text" id="building-address" class="sidebar-input">
                    </div>
                </div>
                <div id="intersection-fields" style="display: none;">
                    <div class="feature-group">
                        <label for="road-h">Horizontal (W/E) Road</label>
                        <input type="text" id="road-h" class="sidebar-input">
                    </div>
                    <div class="feature-group">
                        <label for="lanes-h">Horizontal Lanes</label>
                        <input type="number" id="lanes-h" class="sidebar-input">
                    </div>
                    <div class="feature-group">
                        <label for="road-v">Vertical (N/S) Road</label>
                        <input type="text" id="road-v" class="sidebar-input">
                    </div>
                    <div class="feature-group">
                        <label for="lanes-v">Vertical Lanes</label>
                        <input type="number" id="lanes-v" class="sidebar-input">
                    </div>
                </div>
                <div id="edge-fields" style="display: none;">
                    <div class="feature-group">
                        <label for="edge-speed">Speed Limit</label>
                        <input type="number" id="edge-speed" class="sidebar-input" value="40">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="modal-delete" class="sidebar-btn error" style="display: none;">
                    <i data-lucide="trash-2"></i>
                    Delete
                </button>
                <button id="modal-cancel" class="sidebar-btn">Cancel</button>
                <button id="modal-save" class="sidebar-btn go-btn">Save</button>
            </div>
        </div>

        <div id="data-modal" class="modal" style="display: none;">
            <div class="modal-header">
                <h3>Creation Data</h3>
                <i data-lucide="x" class="close-modal"></i>
            </div>
            <div class="modal-body">
                <textarea id="creation-data-output" readonly class="data-textarea"></textarea>
            </div>
            <div class="modal-footer">
                <button id="copy-data-btn" class="sidebar-btn">Copy to Clipboard</button>
                <button id="close-data-modal" class="sidebar-btn go-btn">Close</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="workers/script.js"></script>
    <script src="workers/testing.js"></script>
</body>

</html>
